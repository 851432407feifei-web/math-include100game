<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>错题解析</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --bg-color: #F4F7F6;
            --card-bg: #ffffff;
            --primary-color: #FFB347;
            --text-main: #4A4A4A;
            --text-light: #9B9B9B;
            --shadow-color: rgba(126, 200, 227, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(136, 216, 176, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(136, 216, 176, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            margin: 0;
            padding: 20px 15px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px var(--shadow-color), 0 5px 15px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 600px;
            border: 4px solid #fff;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #eee;
        }

        .back-btn {
            appearance: none;
            border: 2px solid rgba(0,0,0,0.08);
            background: #fafafa;
            color: var(--text-main);
            border-radius: 12px;
            padding: 8px 16px;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 900;
            flex: 1;
            text-align: center;
            padding-right: 70px; /* 平衡返回按钮的占位 */
        }

        .explain-section {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .explain-section-title {
            font-weight: 900;
            margin-bottom: 12px;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .explain-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .explain-note {
            color: var(--text-light);
            font-weight: 800;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .speak-btn {
            appearance: none;
            border: 2px solid rgba(46, 204, 113, 0.25);
            background: rgba(46, 204, 113, 0.12);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 900;
            margin-top: 10px;
            color: #27ae60;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            white-space: pre;
            background: #fafafa;
            border-radius: 14px;
            padding: 16px;
            border: 1px solid #eee;
            font-size: 1.2rem;
            line-height: 1.5;
            text-align: center;
            display: inline-block;
        }

        .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">⬅ 返回</a>
            <h1>📘 错题解析</h1>
        </div>
        <div id="content"></div>
    </div>

    <script>
        class Explainer {
            constructor() {
                this.content = document.getElementById('content');
                
                // 提前初始化语音引擎，解决部分浏览器首次点击无声的问题
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices(); 
                }
                
                this.init();
            }

            init() {
                const params = new URLSearchParams(window.location.search);
                const idxStr = params.get('idx');
                if (!idxStr) return this.showError('找不到对应的题目记录。');

                const idx = parseInt(idxStr, 10);
                if (isNaN(idx)) return this.showError('参数错误。');

                try {
                    const savedData = localStorage.getItem('mathGameProgress');
                    if (!savedData) return this.showError('没有找到游戏进度。');

                    const data = JSON.parse(savedData);
                    const history = data.history || [];
                    const item = history[idx];

                    if (!item || typeof item !== 'object') return this.showError('记录已失效或不支持解析。');

                    this.content.appendChild(this.buildExplainDom(item));
                } catch (e) {
                    console.error(e);
                    this.showError('读取数据失败。');
                }
            }

            showError(msg) {
                this.content.innerHTML = `<div class="error-msg">${msg}</div>`;
            }

            async speak(text) {
                // 如果你想使用绝对的“卡通音”，目前浏览器自带的 SpeechSynthesis 确实做不到。
                // 这里使用一个免费的第三方 TTS API (例如有道翻译的非官方接口，仅供测试演示，生产环境请更换为自己的 API)
                // 这个接口的 type=2 是一个稍微年轻/清脆的女声，比浏览器自带的更像“配音”。

                try {
                    // 为了防止多次点击造成声音重叠，先停止当前正在播放的音频
                    if (this.currentAudio) {
                        this.currentAudio.pause();
                        this.currentAudio.currentTime = 0;
                    }

                    // 构建第三方 API 请求 URL
                    // 注意：这只是一个用于演示的公开接口，不保证长期稳定。
                    // 生产环境中，你应该使用自己后端的 API，比如： fetch('/api/tts?text=' + text)
                    const url = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=zh&type=2`;
                    
                    this.currentAudio = new Audio(url);
                    
                    // 播放音频
                    await this.currentAudio.play();
                    console.log('第三方语音播放成功:', text);

                } catch (error) {
                    console.error('第三方语音播放失败，回退到浏览器自带语音:', error);
                    this.fallbackSpeak(text);
                }
            }

            // 回退方案：如果第三方 API 失败，仍然使用浏览器自带的语音
            fallbackSpeak(text) {
                if (!('speechSynthesis' in window) || !window.SpeechSynthesisUtterance) {
                    alert("当前浏览器不支持语音播报功能，请尝试使用 Chrome 浏览器。");
                    return;
                }
                
                window.speechSynthesis.resume();
                window.speechSynthesis.cancel();
                
                const u = new SpeechSynthesisUtterance(text);
                
                const voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    const preferredNames = ['xiaoxiao online', 'xiaoxiao', 'tingting', 'yaoyao', 'meijia', 'huihui'];
                    let selectedVoice = voices.find(v => 
                        (v.lang.includes('zh') || v.lang.includes('cmn')) && 
                        preferredNames.some(name => v.name.toLowerCase().includes(name))
                    );
                    
                    if (!selectedVoice) {
                        selectedVoice = voices.find(v => 
                            v.lang.includes('zh') || 
                            v.lang.includes('cmn') || 
                            v.name.includes('Chinese') || 
                            v.name.includes('中文')
                        );
                    }

                    if (selectedVoice) {
                        u.voice = selectedVoice;
                    }
                }
                
                u.lang = 'zh-CN';
                u.rate = 0.85;
                u.pitch = 1.1;
                u.volume = 1.0; 
                
                setTimeout(() => {
                    window.speechSynthesis.speak(u);
                }, 50);
            }

            stickSvg(count, size = 16, isRealistic = false) {
                if (count <= 0) {
                    return ``;
                }
                
                if (isRealistic) {
                    // 高仿真柴火木棒图：原木色，有树皮纹理，没有火柴头，所有小棒垂直一致
                    const sticks = Array.from({ length: count }).map((_, i) => {
                        return `
                        <div style="
                            display: inline-block;
                            width: 8px;
                            height: 80px;
                            margin: 0 4px;
                            position: relative;
                        ">
                            <!-- 柴火木身 (原木色带树皮感) -->
                            <div style="
                                position: absolute;
                                top: 0;
                                left: 0;
                                width: 8px;
                                height: 80px;
                                background: linear-gradient(90deg, #d4a373 0%, #b87d4b 40%, #8b5a2b 100%);
                                border-radius: 3px;
                                box-shadow: 1px 2px 4px rgba(0,0,0,0.3), inset -1px 0px 2px rgba(0,0,0,0.2);
                                overflow: hidden;
                            ">
                                <!-- 树皮纹理线条 -->
                                <div style="position:absolute;top:5px;left:1px;width:1px;height:25px;background:rgba(60,30,10,0.3);border-radius:1px;"></div>
                                <div style="position:absolute;top:40px;left:3px;width:1px;height:20px;background:rgba(60,30,10,0.4);border-radius:1px;"></div>
                                <div style="position:absolute;top:15px;right:2px;width:1px;height:50px;background:rgba(60,30,10,0.2);border-radius:1px;"></div>
                            </div>
                        </div>`;
                    }).join('');
                    return `<div style="display:flex;flex-wrap:wrap;gap:2px;padding:12px 0;align-items:flex-end;min-height:95px;">${sticks}</div>`;
                }

                // 普通图示版本（用于 20 以内成捆显示，非实物，纯平面的圆角矩形）
                // 增大 size 以加长小棒，让效果更明显
                const w = Math.max(1, count) * (size + 4) + 8;
                const stickHeight = 80; // 固定高度让成捆和散装的小棒一样长
                const h = stickHeight + 10; 
                const sticks = Array.from({ length: count }).map((_, i) => {
                    const x = 6 + i * (size + 4);
                    return `
                        <rect x="${x}" y="4" width="${size * 0.6}" height="${stickHeight}" rx="3" fill="url(#wood_stick)" stroke="rgba(0,0,0,0.15)"/>
                    `;
                }).join('');
                return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="wood_stick" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0" stop-color="#d4a373"/><stop offset="0.5" stop-color="#b87d4b"/><stop offset="1" stop-color="#8b5a2b"/>
                        </linearGradient>
                    </defs>
                    ${sticks}
                </svg>`;
            }

            bundleSvg(tens, ones) {
                if (tens <= 0 && ones <= 0) {
                    return `<div style="display:flex; align-items:center; gap: 20px; justify-content: center; min-height: 100px;">
                        <div style="width:160px; display:flex; justify-content:flex-end;"></div>
                        <div style="width:160px; display:flex; justify-content:flex-start; align-items:center;"></div>
                    </div>`;
                }
                
                // 制作“一捆”的视觉效果（扎起来的木棒）
                const base = this.stickSvg(10, 10).replace('<svg', '<svg style="display:block"');
                const bundles = Array.from({ length: Math.max(0, tens) }).map(() => `
                    <div style="
                        display:inline-block;
                        padding: 8px;
                        border-radius:8px;
                        background:transparent;
                        position:relative;
                        margin-right: 8px;
                    ">
                        <!-- 圈起一捆的圆角矩形框 -->
                        <div style="
                            position:absolute;
                            left: 0;
                            top: 0;
                            width: 100%;
                            height: 100%;
                            border: 3px solid #b0b0b0;
                            border-radius: 12px;
                            box-shadow: 0 2px 6px rgba(176, 176, 176, 0.2), inset 0 2px 4px rgba(176, 176, 176, 0.1);
                            z-index: 10;
                            pointer-events: none;
                        "></div>
                        
                        ${base}
                    </div>
                `).join('');
                
                // 十位区域（固定宽度对齐）
                const tensHtml = tens > 0 
                    ? `<div style="display:flex; gap:5px; flex-wrap:wrap; align-items:center;">${bundles}</div>`
                    : ``;
                
                // 个位区域（固定宽度对齐）
                const onesHtml = ones > 0
                    ? this.stickSvg(ones, 16)
                    : ``;

                // 左右布局：左边是成捆的十位，右边是散装的个位，强制宽度对齐
                return `
                <div style="display:flex; align-items:center; gap: 20px; justify-content: flex-start; min-height: 100px; margin-left: 120px;">
                    <div style="width:160px; display:flex; justify-content:flex-end;">
                        ${tensHtml}
                    </div>
                    <div style="width:160px; display:flex; justify-content:flex-start; align-items:center;">
                        ${onesHtml}
                    </div>
                </div>`;
            }

            vertical(op, a, b) {
                const w = Math.max(String(a).length, String(b).length) + 2;
                const A = String(a).padStart(w);
                const B = (op + String(b)).padStart(w);
                const line = '-'.repeat(w);
                const res = op === '+' ? a + b : a - b;
                const R = String(res).padStart(w);
                return `${A}\n${B}\n${line}\n${R}`;
            }

            buildExplainDom(item) {
                const wrap = document.createElement('div');

                const eq = document.createElement('div');
                eq.className = 'explain-section';
                const title = document.createElement('div');
                title.className = 'explain-section-title';
                title.textContent = `题目：${item.num1} ${item.operator} ${item.num2} = ?`;
                eq.appendChild(title);
                
                const userAns = document.createElement('div');
                userAns.className = 'explain-note';
                userAns.innerHTML = `你的答案：<span style="color:#e74c3c">${item.userVal}</span>`;
                eq.appendChild(userAns);
                
                const note = document.createElement('div');
                note.className = 'explain-note';
                note.innerHTML = `正确答案：<span style="color:#27ae60;font-size:1.2em">${item.answer}</span>`;
                eq.appendChild(note);
                
                wrap.appendChild(eq);

                let level = item.level;
                if (!level) {
                    // 兼容旧数据：根据操作数动态推断 level
                    const n1 = item.num1;
                    const n2 = item.num2;
                    const op = item.operator;
                    const res = op === '+' ? n1 + n2 : n1 - n2;
                    
                    if (n1 <= 10 && n2 <= 10 && res <= 10 && res >= 0) {
                        level = 1;
                    } else if (n1 <= 20 && n2 <= 20 && res <= 20 && res >= 0) {
                        if (op === '+') {
                            const carry = (n1 % 10) + (n2 % 10) >= 10;
                            level = carry ? 3 : 2;
                        } else {
                            const borrow = (n1 % 10) < (n2 % 10);
                            level = borrow ? 4 : 2;
                        }
                    } else {
                        level = 5;
                    }
                }

                if (level === 1) {
                    const sec = document.createElement('div');
                    sec.className = 'explain-section';
                    const t = document.createElement('div');
                    t.className = 'explain-section-title';
                    t.textContent = '用小棒来理解';
                    sec.appendChild(t);

                    const row = document.createElement('div');
                    row.className = 'explain-row';

                    const left = document.createElement('div');
                    left.innerHTML = `<div class="explain-note">表示 ${item.num1}</div>${this.stickSvg(item.num1, 16, true)}`;
                    const right = document.createElement('div');
                    right.innerHTML = `<div class="explain-note">表示 ${item.num2}</div>${this.stickSvg(item.num2, 16, true)}`;
                    row.appendChild(left);
                    row.appendChild(right);
                    sec.appendChild(row);

                    const out = document.createElement('div');
                    out.style.marginTop = '12px';
                    const result = item.operator === '+' ? item.num1 + item.num2 : item.num1 - item.num2;
                    const actionText = item.operator === '+' ? '合起来，一共有' : '拿走后，剩下';
                    out.innerHTML = `<div class="explain-note">${actionText}</div>${this.stickSvg(Math.max(0, result), 16, true)}`;
                    sec.appendChild(out);

                    // 新增：10以内语音讲解
                    const leftSpeak = item.num1 === 0 ? "左边没有小棒" : `左边的${item.num1}根小棒表示${item.num1}`;
                    const rightSpeak = item.num2 === 0 ? "右边没有小棒" : `右边的${item.num2}根小棒表示${item.num2}`;
                    
                    const speakStr = item.operator === '+' 
                        ? `${leftSpeak}，${rightSpeak}，合起来我们数一数，一共是${result}。`
                        : `${leftSpeak}，拿走${item.num2 === 0 ? "0" : item.num2}根，剩下我们数一数，还剩${result}根。`;
                    
                    const speakBtn = document.createElement('button');
                    speakBtn.type = 'button';
                    speakBtn.className = 'speak-btn';
                    speakBtn.textContent = '🔊 听语音解说';
                    speakBtn.addEventListener('click', () => this.speak(speakStr));
                    sec.appendChild(speakBtn);

                    wrap.appendChild(sec);
                    return wrap;
                }

                if (level >= 2 && level <= 4) {
                    const sec1 = document.createElement('div');
                    sec1.className = 'explain-section';
                    const t1 = document.createElement('div');
                    t1.className = 'explain-section-title';
                    t1.textContent = '用小棒来理解';
                    sec1.appendChild(t1);

                    const aT = Math.floor(item.num1 / 10);
                    const aU = item.num1 % 10;
                    const bT = Math.floor(item.num2 / 10);
                    const bU = item.num2 % 10;

                    const row = document.createElement('div');
                    row.className = 'explain-row';
                    row.style.display = 'flex';
                    row.style.flexDirection = 'column'; // 垂直排列
                    row.style.gap = '15px';
                    row.style.width = '100%';
                    
                    const A = document.createElement('div');
                    A.style.textAlign = 'left';
                    A.innerHTML = `<div class="explain-note" style="margin-bottom: 10px;">第一个数：${item.num1}</div>${this.bundleSvg(aT, aU)}`;
                    
                    const B = document.createElement('div');
                    B.style.textAlign = 'left';
                    B.innerHTML = `<div class="explain-note" style="margin-bottom: 10px;">第二个数：${item.num2}</div>${this.bundleSvg(bT, bU)}`;
                    
                    row.appendChild(A);
                    row.appendChild(B);
                    sec1.appendChild(row);
                    
                    // 新增：20以内不进退位语音讲解（作为基础解说）
                    if (level === 2) {
                        const speakStr = item.operator === '+'
                            ? `十位加十位，个位加个位。最后得到 ${item.answer}。`
                            : `十位减十位，个位减个位。最后得到 ${item.answer}。`;
                        const speakBtn = document.createElement('button');
                        speakBtn.type = 'button';
                        speakBtn.className = 'speak-btn';
                        speakBtn.textContent = '🔊 听语音解说';
                        speakBtn.addEventListener('click', () => this.speak(speakStr));
                        sec1.appendChild(speakBtn);
                    }

                    wrap.appendChild(sec1);

                    if (level === 3) {
                        const sec2 = document.createElement('div');
                        sec2.className = 'explain-section';
                        const t2 = document.createElement('div');
                        t2.className = 'explain-section-title';
                        t2.textContent = '凑十法（满10根就捆成一捆）';
                        sec2.appendChild(t2);

                        const need = 10 - aU;
                        const taken = Math.min(need, bU);
                        const afterU1 = aU + taken;
                        const leftU2 = bU - taken;
                        const carry = afterU1 >= 10 ? 1 : 0;
                        const resT = aT + bT + carry;
                        const resU = (afterU1 % 10) + leftU2;

                        const row2 = document.createElement('div');
                        row2.className = 'explain-row';
                        const step = document.createElement('div');
                        step.innerHTML = `<div class="explain-note">先把第二个数的 ${taken} 根小棒拿来补满10根</div>${this.bundleSvg(aT, aU)}<div style="height:10px"></div>${this.bundleSvg(bT, bU)}`;
                        row2.appendChild(step);
                        sec2.appendChild(row2);

                        const speak = document.createElement('button');
                        speak.type = 'button';
                        speak.className = 'speak-btn';
                        speak.textContent = '🔊 满10根，10根变一捆';
                        speak.addEventListener('click', () => this.speak('满10根，10根变一捆'));
                        sec2.appendChild(speak);

                        const out = document.createElement('div');
                        out.style.marginTop = '12px';
                        out.innerHTML = `<div class="explain-note">得到：${item.answer}</div>${this.bundleSvg(resT, resU)}`;
                        sec2.appendChild(out);
                        wrap.appendChild(sec2);
                    }

                    if (level === 4) {
                        const sec2 = document.createElement('div');
                        sec2.className = 'explain-section';
                        const t2 = document.createElement('div');
                        t2.className = 'explain-section-title';
                        t2.textContent = '破十法（个位不够减，就拆开一捆变10根）';
                        sec2.appendChild(t2);

                        const borrow = aU < bU ? 1 : 0;
                        const newT = aT - borrow;
                        const newU = aU + (borrow ? 10 : 0);

                        const row2 = document.createElement('div');
                        row2.className = 'explain-row';
                        const step = document.createElement('div');
                        step.innerHTML = `<div class="explain-note">把 ${item.num1} 变成：${newT}捆 + ${newU}根</div>${this.bundleSvg(newT, newU)}`;
                        row2.appendChild(step);
                        sec2.appendChild(row2);

                        const speak = document.createElement('button');
                        speak.type = 'button';
                        speak.className = 'speak-btn';
                        speak.textContent = '🔊 个位不够减，拆开一捆变10根';
                        speak.addEventListener('click', () => this.speak('个位不够减，拆开一捆变10根'));
                        sec2.appendChild(speak);

                        const out = document.createElement('div');
                        out.style.marginTop = '12px';
                        out.innerHTML = `<div class="explain-note">再减去 ${item.num2}，得到：${item.answer}</div>${this.bundleSvg(Math.floor(item.answer / 10), item.answer % 10)}`;
                        sec2.appendChild(out);
                        wrap.appendChild(sec2);
                    }

                    return wrap;
                }

                const sec = document.createElement('div');
                sec.className = 'explain-section';
                const t = document.createElement('div');
                t.className = 'explain-section-title';
                t.textContent = '竖式';
                sec.appendChild(t);

                const pre = document.createElement('div');
                pre.className = 'mono';
                pre.textContent = this.vertical(item.operator, item.num1, item.num2);
                
                const centerWrap = document.createElement('div');
                centerWrap.style.textAlign = 'center';
                centerWrap.appendChild(pre);
                sec.appendChild(centerWrap);

                const extra = document.createElement('div');
                extra.className = 'explain-note';
                extra.style.textAlign = 'center';
                
                let speakStr = '';
                if (item.operator === '+') {
                    const carry = (item.num1 % 10) + (item.num2 % 10) >= 10;
                    extra.textContent = carry ? '个位相加满10，向十位进1。' : '先算个位，再算十位。';
                    speakStr = carry ? '注意，个位相加满十，要向十位进一。' : '竖式加法，先算个位，再算十位。';
                } else {
                    const borrow = (item.num1 % 10) < (item.num2 % 10);
                    extra.textContent = borrow ? '个位不够减，向十位借1（变成个位+10）。' : '先算个位，再算十位。';
                    speakStr = borrow ? '注意，个位不够减，要向十位借一当十。' : '竖式减法，先算个位，再算十位。';
                }
                sec.appendChild(extra);
                
                const speakBtn = document.createElement('button');
                speakBtn.type = 'button';
                speakBtn.className = 'speak-btn';
                speakBtn.textContent = '🔊 听解说';
                speakBtn.style.display = 'block';
                speakBtn.style.margin = '10px auto 0';
                speakBtn.addEventListener('click', () => this.speak(speakStr));
                sec.appendChild(speakBtn);
                
                wrap.appendChild(sec);
                return wrap;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Explainer();
        });
    </script>
</body>
</html>
