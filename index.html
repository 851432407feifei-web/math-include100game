<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 苹果 iOS 专属配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="数学挑战">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- 安卓 Chrome 专属配置 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4CAF50">
    
    <title>100以内加减法自适应挑战</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            /* 中性活泼色系 */
            --bg-color: #F4F7F6; /* 非常淡的灰蓝色背景，护眼且中性 */
            --card-bg: #ffffff;
            --primary-color: #FFB347; /* 活力橘，男女皆宜，代表能量 */
            --secondary-color: #88D8B0; /* 清新薄荷绿，代表成长 */
            --accent-color: #7EC8E3; /* 天空蓝，代表冷静与智慧 */
            --text-main: #4A4A4A; /* 深灰，比纯黑更柔和 */
            --text-light: #9B9B9B;
            --success-color: #2ECC71;
            --error-color: #FF6B6B;
            --shadow-color: rgba(126, 200, 227, 0.2); /* 用浅蓝色做通用阴影 */
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            /* 改为更有科技感/现代感的中性网格背景 */
            background-image: 
                linear-gradient(rgba(136, 216, 176, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(136, 216, 176, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            color: var(--text-main);
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px var(--shadow-color), 0 5px 15px rgba(0,0,0,0.03);
            text-align: center;
            width: 100%;
            max-width: 450px;
            border: 4px solid #fff;
        }

        header h1 {
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background-color: #e8f5e9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: bold;
            color: #2e7d32;
            font-size: 1rem;
        }

        .stat-item span {
            font-weight: bold;
        }

        .problem-box {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            padding: 25px 0;
            background: #FAFAFA;
            border-radius: 20px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }

        #operator {
            color: var(--primary-color); /* 符号用活力橘突出 */
        }

        #answer-input {
            font-size: 3rem;
            width: 130px;
            height: 80px;
            text-align: center;
            border: 4px solid var(--accent-color);
            border-radius: 20px;
            padding: 5px;
            font-weight: 900;
            color: var(--text-main);
            background-color: #fff;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(126, 200, 227, 0.25);
            font-family: 'Nunito', sans-serif;
        }

        #answer-input:focus {
            outline: none;
            border-color: var(--primary-color);
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(255, 179, 71, 0.3);
        }

        /* 隐藏箭头 */
        #answer-input::-webkit-outer-spin-button,
        #answer-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .feedback-msg {
            height: 40px;
            margin-top: 20px;
            font-weight: 900;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .feedback-success { 
            color: var(--success-color); 
            background-color: rgba(46, 204, 113, 0.1);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .feedback-error { 
            color: var(--error-color); 
            background-color: rgba(255, 107, 107, 0.1);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .history-log {
            margin-top: 3rem;
            text-align: left;
        }

        .history-log h3 {
            font-size: 1.2rem;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .history-log h3::before, .history-log h3::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 2px;
            background-color: #eee;
        }
        .history-log h3::before { left: 0; }
        .history-log h3::after { right: 0; }

        /* 移除固定高度和滚动条，改为自然排列 */
        #history-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px; /* 卡片之间的间距 */
        }

        #history-list li {
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            background-color: #fcfcfc;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            animation: slideDown 0.3s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 针对不同结果定制历史记录卡片样式 */
        #history-list li[data-status="correct"] {
            border-color: rgba(46, 204, 113, 0.3);
            color: #27ae60 !important;
            background-color: #f0fdf4;
        }

        #history-list li[data-status="incorrect"] {
            border-color: rgba(255, 107, 107, 0.3);
            color: #e74c3c !important;
            background-color: #fef2f2;
            opacity: 0.8;
        }

        /* 为表情图标增加间距 */
        .history-icon {
            margin-right: 10px;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 数学小天才挑战</h1>
            <div class="stats-bar">
                <div class="stat-item">等级: <span id="level">1</span></div>
                <div class="stat-item">得分: <span id="score">0</span></div>
                <div class="stat-item">连对: <span id="streak">0</span></div>
            </div>
        </header>

        <main class="game-area">
            <div class="problem-box">
                <span id="num1">?</span>
                <span id="operator">+</span>
                <span id="num2">?</span>
                <span>=</span>
                <input type="number" id="answer-input" placeholder="?" autocomplete="off" inputmode="numeric">
            </div>
            
            <div id="feedback" class="feedback-msg"></div>
        </main>

        <div class="history-log">
            <h3>📝 答题记录</h3>
            <ul id="history-list">
                <!-- 历史记录将在这里显示 -->
            </ul>
        </div>
    </div>

    <script>
        class MathGame {
            constructor() {
                this.level = 1;
                this.score = 0;
                this.streak = 0; // 连续答对次数
                this.wrongStreak = 0; // 连续答错次数
                this.history = []; // 存储历史记录
                this.currentProblem = null;

                // DOM 元素
                this.dom = {
                    num1: document.getElementById('num1'),
                    num2: document.getElementById('num2'),
                    operator: document.getElementById('operator'),
                    input: document.getElementById('answer-input'),
                    feedback: document.getElementById('feedback'),
                    level: document.getElementById('level'),
                    score: document.getElementById('score'),
                    streak: document.getElementById('streak'),
                    history: document.getElementById('history-list')
                };

                this.isProcessing = false; // 防止重复提交标志
                this.loadProgress(); // 加载进度
                
                // 预加载音频
                this.audioCache = {
                    correct: new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg'),
                    wrong: new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg')
                };
                
                // 尝试预加载
                this.audioCache.correct.load();
                this.audioCache.wrong.load();
                
                this.init();
            }

            init() {
                this.generateProblem();
                
                // 监听输入事件自动提交
                this.dom.input.addEventListener('input', () => {
                    this.autoCheckAnswer();
                });

                // 保留回车键作为备用
                this.dom.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.checkAnswer(true);
                    }
                });
                
                // 页面加载自动获取焦点
                this.dom.input.focus();
                
                this.updateStats();
            }

            // 加载进度
            loadProgress() {
                const savedData = localStorage.getItem('mathGameProgress');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        this.level = data.level || 1;
                        this.score = data.score || 0;
                        this.streak = data.streak || 0;
                        this.wrongStreak = data.wrongStreak || 0;
                        this.history = data.history || [];
                        
                        // 恢复历史记录显示
                        this.dom.history.innerHTML = ''; 
                        this.history.forEach(item => {
                            const li = document.createElement('li');
                            // 兼容旧版本数据结构
                            if(item.html) {
                                li.innerHTML = item.html;
                                li.setAttribute('data-status', item.status);
                            } else {
                                li.textContent = item.text;
                                li.style.color = item.color;
                            }
                            this.dom.history.appendChild(li); 
                        });
                    } catch (e) {
                        console.error('读取进度失败', e);
                    }
                }
            }

            // 保存进度
            saveProgress() {
                const data = {
                    level: this.level,
                    score: this.score,
                    streak: this.streak,
                    wrongStreak: this.wrongStreak,
                    history: this.history
                };
                localStorage.setItem('mathGameProgress', JSON.stringify(data));
            }

            // 生成随机整数 [min, max]
            randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            generateProblem() {
                let num1, num2, operator, answer;
                const isAddition = Math.random() > 0.5; // 50% 概率加法或减法
                operator = isAddition ? '+' : '-';

                // 自适应难度逻辑
                switch(this.level) {
                    case 1: // 10以内 (初级)
                        if (isAddition) {
                            num1 = this.randomInt(0, 5);
                            num2 = this.randomInt(0, 10 - num1);
                        } else {
                            num1 = this.randomInt(1, 10);
                            num2 = this.randomInt(0, num1);
                        }
                        break;

                    case 2: // 20以内，不进位/不退位
                        if (isAddition) {
                            num1 = this.randomInt(1, 10);
                            num2 = this.randomInt(1, 20 - num1); 
                        } else {
                            num1 = this.randomInt(2, 20);
                            num2 = this.randomInt(1, num1);
                        }
                        break;
                    
                    case 3: // 100以内，不进位/不退位 (中级)
                        if (isAddition) {
                            // 个位不进位: 个位和 <= 9
                            let u1 = this.randomInt(0, 9);
                            let u2 = this.randomInt(0, 9 - u1);
                            // 十位: 十位和 <= 9
                            let t1 = this.randomInt(1, 8);
                            let t2 = this.randomInt(0, 8 - t1);
                            num1 = t1 * 10 + u1;
                            num2 = t2 * 10 + u2;
                        } else {
                            // 个位不退位: u1 >= u2
                            let u1 = this.randomInt(0, 9);
                            let u2 = this.randomInt(0, u1);
                            let t1 = this.randomInt(1, 9);
                            let t2 = this.randomInt(0, t1);
                            num1 = t1 * 10 + u1;
                            num2 = t2 * 10 + u2;
                        }
                        break;

                    case 4: // 100以内，强制进位/退位 (高级)
                    default:
                        if (isAddition) {
                            // 制造进位: 个位和 >= 10
                            let u1 = this.randomInt(1, 9);
                            let u2 = this.randomInt(10 - u1, 9);
                            let t1 = this.randomInt(1, 7); // 保证不超过100
                            let t2 = this.randomInt(0, 8 - t1);
                            num1 = t1 * 10 + u1;
                            num2 = t2 * 10 + u2;
                        } else {
                            // 制造退位: u1 < u2
                            let u1 = this.randomInt(0, 8);
                            let u2 = this.randomInt(u1 + 1, 9);
                            let t1 = this.randomInt(2, 9);
                            let t2 = this.randomInt(0, t1 - 1);
                            num1 = t1 * 10 + u1;
                            num2 = t2 * 10 + u2;
                        }
                        break;
                }

                // 计算正确答案
                answer = isAddition ? num1 + num2 : num1 - num2;
                this.currentProblem = { num1, num2, operator, answer };
                
                // 更新 UI
                this.dom.num1.textContent = num1;
                this.dom.num2.textContent = num2;
                this.dom.operator.textContent = operator;
                this.dom.input.value = '';
                this.dom.input.disabled = false;
                
                // 强制焦点
                setTimeout(() => this.dom.input.focus(), 10);
                this.isProcessing = false;
            }

            autoCheckAnswer() {
                if (this.isProcessing) return;
                const userValStr = this.dom.input.value;
                const answerStr = this.currentProblem.answer.toString();
                
                // 如果输入长度达到答案长度，触发检查
                if (userValStr.length >= answerStr.length) {
                    this.checkAnswer();
                }
            }

            // 播放外部音效 (使用 Google 卡通音效库)
            playFeedback(isCorrect) {
                const audio = isCorrect ? this.audioCache.correct : this.audioCache.wrong;
                
                // 重置播放进度，确保可以连续播放
                audio.currentTime = 0;
                audio.volume = 0.6; // 音量适中
                
                audio.play().catch(e => {
                    console.log('播放失败，可能是网络问题或浏览器限制:', e);
                });
            }

            checkAnswer(force = false) {
                if (this.isProcessing) return;
                const userVal = parseInt(this.dom.input.value);
                if (isNaN(userVal)) return;

                this.isProcessing = true;
                this.dom.input.disabled = true; // 锁定输入框防闪烁

                const isCorrect = userVal === this.currentProblem.answer;
                
                if (isCorrect) {
                    this.handleCorrect();
                } else {
                    this.handleIncorrect();
                }
                
                this.playFeedback(isCorrect); // 播放语音反馈
                
                this.addHistory(isCorrect, userVal);
                this.updateStats();
                this.saveProgress(); // 每次答题后保存进度
                
                // 延时缩短到 1 秒
                setTimeout(() => {
                    this.dom.feedback.textContent = '';
                    this.dom.feedback.className = 'feedback-msg';
                    this.generateProblem();
                }, 1000);
            }

            handleCorrect() {
                this.score += 10 + (this.level * 2); // 难度越高分越高
                this.streak++;
                this.wrongStreak = 0;
                
                this.dom.feedback.textContent = '🎉 回答正确！真棒！';
                this.dom.feedback.className = 'feedback-msg feedback-success';

                // 晋级检查
                if (this.streak >= 5 && this.level < 4) {
                    this.level++;
                    this.streak = 0;
                    this.dom.feedback.textContent += ' (难度升级！)';
                }
            }

            handleIncorrect() {
                this.streak = 0;
                this.wrongStreak++;
                
                this.dom.feedback.textContent = `❌ 哎呀，正确答案是 ${this.currentProblem.answer}`;
                this.dom.feedback.className = 'feedback-msg feedback-error';

                // 降级检查
                if (this.wrongStreak >= 3 && this.level > 1) {
                    this.level--;
                    this.wrongStreak = 0;
                    this.dom.feedback.textContent += ' (难度降低，加油！)';
                }
            }

            updateStats() {
                this.dom.level.textContent = this.level;
                this.dom.score.textContent = this.score;
                this.dom.streak.textContent = this.streak;
            }

            addHistory(isCorrect, userVal) {
                const { num1, num2, operator, answer } = this.currentProblem;
                const li = document.createElement('li');
                
                // 优化历史记录的 HTML 结构，使用自定义属性区分状态
                const icon = isCorrect ? '<span class="history-icon">🥳</span>' : '<span class="history-icon">🥺</span>';
                const textContent = `${icon} ${num1} ${operator} ${num2} = ${userVal} (正确: ${answer})`;
                
                li.innerHTML = textContent;
                li.setAttribute('data-status', isCorrect ? 'correct' : 'incorrect');
                
                this.dom.history.prepend(li);

                // 保存到数据中
                this.history.unshift({
                    html: li.innerHTML,
                    status: li.getAttribute('data-status')
                });
                if (this.history.length > 50) this.history.pop(); // 放宽限制，允许下拉显示更多
            }
        }

        // 启动游戏
        window.addEventListener('DOMContentLoaded', () => {
            new MathGame();
        });
    </script>
</body>
</html>
